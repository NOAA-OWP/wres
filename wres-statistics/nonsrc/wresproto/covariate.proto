syntax = "proto3";

package wres.statistics.generated;

option java_package = "wres.statistics.generated";
option java_outer_classname = "CovariateProto";
option java_multiple_files = true;

message Covariate
{
    /*A message that encapsulates a covariate dataset, which is an ancillary or
      supporting dataset within an evaluation.*/

    string variable_name = 1;
    // The name of the covariate variable.

    optional double minimum_inclusive_value = 2;
    // The minimum value of the covariate.

    optional double maximum_inclusive_value = 3;
    // The maximum value of the covariate.

    enum Purpose
    {
        // The purpose of the covariate within an evaluation.
        
        FILTER = 0;
        // The covariate is used to filter data.
        
        DETECT = 1;
        // The covariate is used to detect events for evaluation.
        
        CLIMATOLOGY = 2;
        // The covariate represents a climatological dataset.
    }

    repeated Purpose purposes = 4;
    // The purposes of the covariate.
}